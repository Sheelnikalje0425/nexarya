{% extends "base.html" %}
{% block title %}Log in — Nexarya{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <a href="/" class="auth-logo">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
        <polygon points="11,2 20,7 20,15 11,20 2,15 2,7" stroke="white" stroke-width="1.5" fill="none"/>
        <text x="11" y="14.5" text-anchor="middle" fill="white" font-family="Inter" font-size="8" font-weight="700">NX</text>
      </svg>
      Nexarya
    </a>
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to manage your orders and projects.</p>

    <ul class="auth-error" id="error-list"></ul>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" required/>
    </div>
    <button class="form-submit" onclick="doLogin()" id="loginBtn">Log in</button>

    <p class="auth-switch">Don't have an account? <a href="/register">Register here</a></p>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
async function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Logging in...'; btn.disabled = true;
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = data.redirect;
  } else {
    const el = document.getElementById('error-list');
    el.style.display = 'block';
    el.innerHTML = data.errors.map(e => `<li>${e}</li>`).join('');
    btn.textContent = 'Log in'; btn.disabled = false;
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
{% endblock %}
