{% extends "base.html" %}
{% block title %}Register — Nexarya{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:400px;background:#121a10;border:1px solid rgba(190,215,180,0.18);border-radius:12px;padding:32px;">
    <h1 style="font-size:24px;margin-bottom:8px;">Create Account</h1>
    <p style="color:rgba(255,255,255,0.6);margin-bottom:24px;">Sign up to get started</p>

    <!-- Error box -->
    <div id="errorBox" style="display:none;background:#2b0d0d;border:1px solid #5c1a1a;color:#f87171;border-radius:8px;padding:12px 14px;font-size:0.85rem;margin-bottom:16px;"></div>

    <form method="POST" id="registerForm">
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Full Name</label>
        <input type="text" name="name" required class="form-input" placeholder="John Doe"/>
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Email</label>
        <input type="email" name="email" required class="form-input" placeholder="you@example.com"/>
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Phone Number</label>
        <input type="tel" name="phone" required class="form-input" placeholder="10-digit mobile number" maxlength="10"/>
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Password</label>
        <input type="password" name="password" required class="form-input" placeholder="Min 6 characters"/>
      </div>

      <div style="margin-bottom:24px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Confirm Password</label>
        <input type="password" name="confirm_password" required class="form-input" placeholder="Repeat password"/>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px;">Create Account</button>
    </form>

    <p style="text-align:center;color:rgba(255,255,255,0.6);font-size:0.9rem;">
      Already have an account? <a href="/login" style="color:#d4a843;text-decoration:none;">Log in</a>
    </p>
  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const pwd     = formData.get('password');
  const confirm = formData.get('confirm_password');
  const errorBox = document.getElementById('errorBox');
  const submitBtn = document.getElementById('submitBtn');

  // Hide previous errors
  errorBox.style.display = 'none';
  errorBox.textContent = '';

  // Check passwords match
  if (pwd !== confirm) {
    errorBox.textContent = 'Passwords do not match.';
    errorBox.style.display = 'block';
    return;
  }

  // Disable button to prevent double submit
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  try {
    const res = await fetch('/register', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      // Success — redirect to dashboard
      window.location.href = data.redirect || '/dashboard';
    } else {
      // Show errors from Flask
      errorBox.textContent = data.errors ? data.errors.join(' ') : 'Registration failed.';
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
    }

  } catch (err) {
    errorBox.textContent = 'Something went wrong. Please try again.';
    errorBox.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
  }
});
</script>
{% endblock %}
