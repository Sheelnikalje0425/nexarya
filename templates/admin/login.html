<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — Nexarya</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair Display:wght@400;700;900&family=Rajdhani:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#020408;--neon:#00f5ff;--neon2:#7b2fff;--neon3:#ff2d7a;--text:#e8f4ff;--muted:#7a9bb5;--card:rgba(0,245,255,0.04);--border:rgba(0,245,255,0.12);--glow:0 0 20px rgba(0,245,255,0.3);}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{width:420px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px 40px;position:relative;overflow:hidden;}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--gold);letter-spacing:3px;text-align:center;display:block;margin-bottom:8px;}
.logo span{color:var(--gold2);}
.admin-tag{font-family:'Inter',sans-serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:32px;display:block;}
h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:24px;}
.form-group{margin-bottom:18px;}
label{display:block;font-family:'Inter',sans-serif;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
input{width:100%;padding:12px 16px;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:all .3s;}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(0,245,255,0.1);}
.btn{width:100%;padding:14px;background:linear-gradient(90deg,var(--gold),var(--gold2));border:none;border-radius:12px;cursor:pointer;font-family:'Playfair Display',serif;font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--bg);margin-top:8px;transition:all .3s;}
.btn:hover{transform:translateY(-2px);box-shadow:var(--glow);}
.err{background:rgba(255,45,122,0.1);border:1px solid rgba(255,45,122,0.3);border-radius:12px;padding:12px;margin-bottom:16px;font-family:'Inter',sans-serif;font-size:.8rem;color:#c06060;}
</style>
</head>
<body>
<div class="box">
  <a href="/" class="logo">NEX<span>ARYA</span></a>
  <span class="admin-tag">// Admin Panel</span>
  <h2>Admin Login</h2>
  {% with messages=get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="err">✗ {{m}}</div>{% endfor %}{% endif %}{% endwith %}
  <form method="POST">
    <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus/></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required/></div>
    <button type="submit" class="btn">Login to Admin →</button>
  </form>
</div>
</body>
</html>
