<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — Nexarya</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0a0a0a; --surface:#111111; --border:rgba(255,255,255,0.08); --border-md:rgba(255,255,255,0.12); --text:#f5f5f5; --muted:#737373; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; -webkit-font-smoothing:antialiased; }
a { color:inherit; text-decoration:none; }
.box { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:44px 36px; }
.logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:0.95rem; margin-bottom:28px; }
h2 { font-size:1.25rem; letter-spacing:-0.02em; margin-bottom:6px; }
.sub { color:var(--muted); font-size:0.85rem; margin-bottom:28px; }
.lbl { display:block; font-size:0.72rem; font-weight:500; color:var(--muted); margin-bottom:6px; letter-spacing:0.03em; }
input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Inter',sans-serif; font-size:0.875rem; padding:10px 14px; border-radius:8px; outline:none; margin-bottom:16px; }
input:focus { border-color:var(--border-md); }
input::placeholder { color:#404040; }
.error { background:#2b0d0d; border:1px solid #5c1a1a; color:#f87171; border-radius:6px; padding:10px 14px; font-size:0.82rem; margin-bottom:16px; display:none; }
.submit { width:100%; background:white; color:black; font-size:0.875rem; font-weight:600; padding:11px; border-radius:8px; border:none; cursor:pointer; margin-top:4px; font-family:'Inter',sans-serif; }
.submit:hover { background:#e5e5e5; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 22 22" fill="none">
      <polygon points="11,2 20,7 20,15 11,20 2,15 2,7" stroke="white" stroke-width="1.5" fill="none"/>
      <text x="11" y="14.5" text-anchor="middle" fill="white" font-family="Inter" font-size="8" font-weight="700">NX</text>
    </svg>
    Nexarya
  </div>
  <h2>Admin login</h2>
  <p class="sub">Restricted to authorised administrators only.</p>

  <div class="error" id="err"></div>

  <form method="POST" action="/admin/login">
    <label class="lbl">Username</label>
    <input type="text" name="username" placeholder="admin" required autofocus/>
    <label class="lbl">Password</label>
    <input type="password" name="password" placeholder="••••••••" required/>
    <button type="submit" class="submit">Log in</button>
  </form>
</div>
{% if error %}
<script>
  const el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = '{{ error }}';
</script>
{% endif %}
</body>
</html>
