<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{% block title %}Admin — Nexarya{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0a; --surface: #111111; --border: rgba(255,255,255,0.08);
  --border-md: rgba(255,255,255,0.12); --text: #f5f5f5; --muted: #737373; --subtle: #404040;
}
html, body { height:100%; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; font-size:14px; -webkit-font-smoothing:antialiased; }
a { color:inherit; text-decoration:none; }

/* SIDEBAR */
.sidebar { width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; }
.sidebar-head { padding:20px 16px; border-bottom:1px solid var(--border); }
.sidebar-logo { display:flex; align-items:center; gap:8px; font-weight:600; font-size:0.9rem; }
.sidebar-tag { font-size:0.65rem; color:var(--muted); letter-spacing:0.06em; margin-top:4px; }
.sidebar-nav { padding:12px 8px; flex:1; overflow-y:auto; }
.sidebar-section { font-size:0.62rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--subtle); padding:8px 10px; margin-top:8px; }
.sidebar a.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; color:var(--muted); font-size:0.83rem; font-weight:450; margin-bottom:2px; }
.sidebar a.nav-item:hover { background:rgba(255,255,255,0.05); color:var(--text); }
.sidebar a.nav-item.active { background:rgba(255,255,255,0.07); color:var(--text); }
.sidebar a.nav-item svg { flex-shrink:0; }
.sidebar-foot { padding:16px; border-top:1px solid var(--border); }
.sidebar-user { font-size:0.78rem; color:var(--muted); margin-bottom:10px; }
.logout-btn { display:block; width:100%; text-align:center; padding:8px; font-size:0.78rem; color:var(--muted); border:1px solid var(--border); border-radius:6px; }
.logout-btn:hover { color:var(--text); border-color:var(--border-md); }

/* MAIN */
.main { margin-left:220px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
.topbar { height:52px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 32px; justify-content:space-between; position:sticky; top:0; background:var(--bg); z-index:50; }
.topbar h1 { font-size:0.9rem; font-weight:600; }
.topbar-meta { font-size:0.72rem; color:var(--muted); }
.content { padding:32px; flex:1; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
th { font-size:0.68rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
td { padding:12px 14px; font-size:0.83rem; border-bottom:1px solid var(--border); color:var(--muted); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.02); }
td.primary { color:var(--text); font-weight:500; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:24px; }
.cards-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.stat-num { font-size:1.8rem; font-weight:700; letter-spacing:-0.03em; }
.stat-lbl { font-size:0.75rem; color:var(--muted); margin-top:4px; }

/* STATUS */
.badge { font-size:0.68rem; font-weight:600; padding:3px 8px; border-radius:4px; letter-spacing:0.04em; }
.badge-pending  { background:rgba(234,179,8,0.12); color:#fbbf24; border:1px solid rgba(234,179,8,0.2); }
.badge-progress { background:rgba(59,130,246,0.12); color:#60a5fa; border:1px solid rgba(59,130,246,0.2); }
.badge-done     { background:rgba(34,197,94,0.12);  color:#4ade80; border:1px solid rgba(34,197,94,0.2); }

/* FORMS */
select, input { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Inter',sans-serif; font-size:0.83rem; padding:6px 10px; border-radius:6px; outline:none; }
select:focus, input:focus { border-color:var(--border-md); }
.btn { display:inline-flex; align-items:center; gap:6px; font-size:0.78rem; font-weight:500; padding:7px 14px; border-radius:6px; border:1px solid var(--border); cursor:pointer; color:var(--muted); background:none; }
.btn:hover { color:var(--text); border-color:var(--border-md); }
.btn-sm { background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:4px; padding:4px 10px; font-size:0.72rem; cursor:pointer; font-family:'Inter',sans-serif; }
.btn-sm:hover { color:var(--text); }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>

<div class="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">
      <svg width="16" height="16" viewBox="0 0 22 22" fill="none">
        <polygon points="11,2 20,7 20,15 11,20 2,15 2,7" stroke="white" stroke-width="1.5" fill="none"/>
        <text x="11" y="14.5" text-anchor="middle" fill="white" font-family="Inter" font-size="8" font-weight="700">NX</text>
      </svg>
      Nexarya
    </div>
    <div class="sidebar-tag">Admin panel</div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Navigation</div>
    <a href="/admin" class="nav-item {% if request.endpoint=='admin_dashboard' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/admin/orders" class="nav-item {% if request.endpoint=='admin_orders' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      Orders
    </a>
    <a href="/admin/users" class="nav-item {% if request.endpoint=='admin_users' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users
    </a>
    <div class="sidebar-section" style="margin-top:16px;">Links</div>
    <a href="/" target="_blank" class="nav-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      View website
    </a>
  </nav>
  <div class="sidebar-foot">
    <div class="sidebar-user">Signed in as {{ admin }}</div>
    <a href="/admin/logout" class="logout-btn">Log out</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    <span class="topbar-meta">Nexarya Admin</span>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
