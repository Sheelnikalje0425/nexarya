{% extends "base.html" %}
{% block title %}Register — Nexarya{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:400px;background:#121a10;border:1px solid rgba(190,215,180,0.18);border-radius:12px;padding:32px;">
    <h1 style="font-size:24px;margin-bottom:8px;">Create Account</h1>
    <p style="color:rgba(255,255,255,0.6);margin-bottom:24px;">Sign up to get started</p>
    
    <form method="POST" id="registerForm">
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Full Name</label>
        <input type="text" name="user_name" required class="form-input" placeholder="John Doe"/>
      </div>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Email</label>
        <input type="email" name="user_email" required class="form-input" placeholder="you@example.com"/>
      </div>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Password</label>
        <input type="password" name="user_password" required class="form-input" placeholder="••••••••"/>
      </div>
      
      <div style="margin-bottom:24px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;">Confirm Password</label>
        <input type="password" name="confirm_password" required class="form-input" placeholder="••••••••"/>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%;margin-bottom:16px;">Create Account</button>
    </form>
    
    <p style="text-align:center;color:rgba(255,255,255,0.6);font-size:0.9rem;">
      Already have an account? <a href="/login" style="color:#d4a843;text-decoration:none;">Log in</a>
    </p>
  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const pwd = formData.get('user_password');
  const confirm = formData.get('confirm_password');
  
  if (pwd !== confirm) {
    showToast('Passwords do not match', 'error');
    return;
  }
  
  try {
    const res = await fetch('/register', {
      method: 'POST',
      body: formData
    });
    
    if (res.ok) {
      showToast('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login', 1500);
    } else {
      const text = await res.text();
      showToast(text || 'Registration failed', 'error');
    }
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
});
</script>
{% endblock %}
